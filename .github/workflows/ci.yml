name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JavaScript syntax check
        run: node --check src/app.js

      - name: Verify required project files
        run: |
          test -f index.html
          test -f src/styles.css
          test -f src/app.js
          test -f README.md
          test -f CHANGELOG.md

      - name: Validate deploy workflow exists
        run: test -f .github/workflows/deploy-pages.yml
